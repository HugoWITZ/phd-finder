name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Format check
        run: uv run ruff format --check src
      - name: Smoke test
        run: uv run python -m src.main ensure --universities ETHZ EPFL

